<!DOCTYPE html>
<html lang="ms">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakej Kahwin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f8f5f2;
}

/* HERO */
.hero {
  background: url('pic/dewan1.jpg') center/cover no-repeat;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero-content {
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 10px;
}

.hero button {
  margin-top: 20px;
  padding: 15px 25px;
  background: #d6c1b0;
  border: none;
  color: white;
  cursor: pointer;
}

/* SECTION */
section {
  padding: 50px 20px;
  max-width: 1100px;
  margin: auto;
}

/* FEATURES BOX */
.features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.feature-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.icon {
  font-size: 30px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}



body {
  font-family: 'Playfair Display', serif;
}

/* MAIN SLIDER */
.slider {
  position: relative;
  width: 100%;
  height: 100vh;   /* FULL SCREEN MACAM POSTER */
  overflow: hidden;
}

.slides {
  display: flex;
  transition: transform 0.6s ease;
  height: 100%;
}

.slide {
  min-width: 100%;
  height: 100%;
  position: relative;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY MACAM POSTER */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 60px;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  text-align: left;
}

.overlay h3 {
  font-size: 40px;
  margin: 0;
}

.overlay p {
  font-size: 18px;
}

/* ARROW STYLE MACAM PREMIUM POSTER */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  background: rgba(0,0,0,0.3);
  padding: 12px 18px;
  cursor: pointer;
  border-radius: 50%;
  transition: 0.3s;
}

.prev:hover, .next:hover {
  background: rgba(0,0,0,0.6);
}

.prev { left: 20px; }
.next { right: 20px; }


/* THUMBNAIL */
.thumbnails {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
}

.thumb {
  color: white;
  font-size: 14px;
  cursor: pointer;
  padding: 6px 12px;
  border: 1px solid white;
  border-radius: 20px;
  background: rgba(0,0,0,0.3);
}

.thumb.active {
  background: white;
  color: black;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  z-index: 999;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 25px;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  text-align: center;
}

.overlay h3 {
  font-size: 64px;
  margin: 0;
  font-weight: 600;
  letter-spacing: 1px;
}

.overlay p {
  font-size: 22px;
  margin-top: 10px;
  opacity: 0.9;
}
/* BADGE */
.badge {
  display: inline-block;
  background: white;
  color: black;
  padding: 6px 12px;
  margin-top: 8px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.badge.purple {
  background: #7b2cbf;
  color: white;
}

/* FORM */
form {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

button.submit {
  background: #b89b84;
  color: white;
  padding: 15px;
  border: none;
  width: 100%;
}
#formSection {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 60px 20px;
}

/* CARD FORM */
form {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  width: 100%;
  max-width: 420px;

  /* 👇 INI YANG PENTING UNTUK CENTER BETUL */
  margin: 0 auto;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-family: 'Playfair Display', serif;
}

/* BUTTON */
button.submit {
  background: #b89b84;
  color: white;
  padding: 14px;
  border: none;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

/* TEXT LABEL */
form p {
  font-weight: 600;
  margin-bottom: 8px;
}

/* CARD FORM */
form {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 450px;   /* 👈 KECILKAN FORM */
}

/* INPUT STYLE LEBIH CLEAN */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-family: 'Playfair Display', serif;
}

/* BUTTON */
button.submit {
  background: #b89b84;
  color: white;
  padding: 14px;
  border: none;
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button.submit:hover {
  background: #a38773;
}
.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.check-item {
  display: flex;
  align-items: center;
  justify-content: space-between; /* 👉 ini buat checkbox pergi kanan */
  background: #f8f5f2;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* buang effect pelik default */
.check-item input {
  width: auto;
  margin: 0;
}

/* LABEL STYLE */
form p {
  margin-bottom: 5px;
  font-weight: 600;
}
form {
  backdrop-filter: blur(5px);
  border: 1px solid rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Pakej Perkahwinan Eksklusif</h1>
    <p>Dewan Cantik + Pakej Lengkap</p>
    <button onclick="scrollToForm()">Tempah Sekarang</button>
  </div>
</div>

<!-- FEATURES -->
<section>
  <h2 style="text-align:center;">Kenapa Pilih Kami?</h2>

  <div class="features">
    <div class="feature-box">
      <div class="icon">✨</div>
      <h3>Dewan Selesa</h3>
      <p>Berhawa dingin & selesa</p>
    </div>

    <div class="feature-box">
      <div class="icon">🚗</div>
      <h3>Parking Luas</h3>
      <p>Ruang mencukupi</p>
    </div>

    <div class="feature-box">
      <div class="icon">👑</div>
      <h3>Pelamin Eksklusif</h3>
      <p>Dekorasi premium</p>
    </div>

    <div class="feature-box">
      <div class="icon">💼</div>
      <h3>Pakej Lengkap</h3>
      <p>Tanpa pening kepala</p>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2 style="text-align:center;">Suasana Dewan</h2>
  <div class="gallery">
    <img src="pic/dewan1.jpg">
    <img src="pic/dewan2.jpg">
    <img src="pic/dewan3.jpg">
    <img src="pic/dewan4.jpg">
  </div>
</section>

<!-- PACKAGE -->
<section>
  <h2 style="text-align:center;">Pilihan Pakej</h2>

  <div class="slider">
    <div class="slides" id="slides">

      <div class="slide">
        <img src="pic/pakej1.jpeg" onclick="openLightbox(this.src)">
        <div class="overlay">
         
        </div>
      </div>

      <div class="slide">
        <img src="pic/pakej2.jpeg" onclick="openLightbox(this.src)">
        <div class="overlay">
         
        </div>
      </div>

      <div class="slide">
        <img src="pic/pakej3.jpeg" onclick="openLightbox(this.src)">
        <div class="overlay">
         
        </div>
      </div>

    </div>

    <div class="prev" onclick="moveSlide(-1)">❮</div>
    <div class="next" onclick="moveSlide(1)">❯</div>
  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>
<form id="bookingForm">
     <h2 style="text-align:center;">Your Details</h2>
  <input type="text" id="nama" placeholder="Nama" required>
  <input type="text" id="phone" placeholder="No Phone" required>
  <input type="email" id="email" placeholder="Email" required>

  <!-- TICKBOX ROLE -->
  <p class="label">Anda ialah:</p>

<div class="checkbox-group">
  <label class="check-item">
    <input type="checkbox" name="role" value="Bakal Pengantin">
    <span>Bakal Pengantin</span>
  </label>

  <label class="check-item">
    <input type="checkbox" name="role" value="Ibu/Bapa Pengantin">
    <span>Ibu/Bapa Pengantin</span>
  </label>

  <label class="check-item">
    <input type="checkbox" name="role" value="Lain-Lain">
    <span>Lain-Lain</span>
  </label>
</div>

  <!-- DATE PICKER -->
  <input type="date" id="tarikh" required>

  <!-- YEAR -->
  <input type="number" id="tahun" placeholder="Tahun Majlis (contoh: 2026)" min="2026" required>
  
<select id="pakej" required>
  <option value="" disabled selected>Pilih Pakej</option>
  <option>Akikah</option>
  <option>Basic Pakej</option>
  <option>Intimate Wedding</option>
</select>

  <input type="text" id="pax" placeholder="Anggaran Pax">

  <button class="submit" type="submit">Hantar ke WhatsApp</button>
</form>
</section>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let nama = document.getElementById("nama").value;
  let phone = document.getElementById("phone").value;
  let email = document.getElementById("email").value;

  // ambil checkbox role
  let roleChecked = document.querySelectorAll('input[name="role"]:checked');
  let roles = [];
  roleChecked.forEach(r => roles.push(r.value));

  let tarikh = document.getElementById("tarikh").value;
  let tahun = document.getElementById("tahun").value;
  let pakej = document.getElementById("pakej").value;
  let pax = document.getElementById("pax").value;

  let message = `Tempahan Pakej Perkahwinan:

Nama: ${nama}
Phone: ${phone}
Email: ${email}
Anda ialah: ${roles.join(", ")}
Tarikh: ${tarikh}
Tahun Majlis: ${tahun}
Pakej: ${pakej}
Pax: ${pax}`;

  let url = "https://wa.me/60192800761?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
});


</script>
<script>
let index = 0;

function moveSlide(step) {
  let slides = document.getElementById("slides");
  let total = slides.children.length;

  index += step;

  if (index < 0) index = total - 1;
  if (index >= total) index = 0;

  slides.style.transform = "translateX(" + (-index * 100) + "%)";
}

// LIGHTBOX
function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>
</body>
</html>
